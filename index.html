<!DOCTYPE html>
<html lang="en">

<title>BMIEL — BioMaterials for Immuno-Engineering Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --navy:#132A46;
  --navy-2:#1F4068;
  --gold:#B8862E;
  --gold-soft:#E7D3A6;
  --cream:#F8F6F1;
  --paper:#FFFFFF;
  --ink:#1B1B1B;
  --muted:#6B6B63;
  --line:#E3DFD3;
  --red:#A8271F;
  --blue:#2A5DB0;
  --serif:'Fraunces',Georgia,serif;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--cream);line-height:1.55;}
a{color:inherit;text-decoration:none;}
button{font-family:var(--sans);cursor:pointer;}
img{max-width:100%;display:block;}

/* ---------- Header ---------- */
header.site{position:sticky;top:0;z-index:100;background:var(--paper);border-bottom:1px solid var(--line);}
.header-top{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;}
.brand{display:flex;align-items:center;gap:16px;position:relative;}
.brand-click{display:flex;align-items:center;gap:16px;cursor:pointer;}
.brand-logo{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 55%,var(--gold) 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--serif);font-weight:700;font-size:15px;letter-spacing:0.5px;flex-shrink:0;position:relative;overflow:hidden;}
.brand-logo::after{content:"";position:absolute;inset:6px;border:1px solid rgba(255,255,255,0.35);border-radius:50%;pointer-events:none;}
.brand-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.brand-logo.has-image{width:auto;border-radius:0;background:none;overflow:visible;}
.brand-logo.has-image::after{display:none;}
.brand-logo.has-image img{width:auto;height:52px;object-fit:unset;border-radius:2px;display:block;}
.logo-edit-btn{border:1px solid var(--line);background:#fff;color:var(--muted);font-size:11px;padding:4px 10px;border-radius:2px;white-space:nowrap;}
.logo-edit-btn:hover{color:var(--navy);border-color:var(--navy);}
.brand-text .name{font-family:var(--serif);font-weight:700;font-size:26px;color:var(--navy);letter-spacing:0.5px;line-height:1;}
.brand-text .full{font-size:13px;color:var(--muted);margin-top:3px;letter-spacing:0.3px;}
.login-btn{border:1px solid var(--navy);background:transparent;color:var(--navy);padding:8px 18px;border-radius:2px;font-size:13px;font-weight:600;letter-spacing:0.4px;transition:.15s;}
.login-btn:hover{background:var(--navy);color:#fff;}
.admin-pill{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--muted);}
.admin-pill b{color:var(--gold);}
.logout-btn{border:none;background:none;color:var(--red);font-size:12.5px;text-decoration:underline;}

nav.main{max-width:1180px;margin:0 auto;padding:0 24px;display:flex;gap:2px;overflow-x:auto;}
nav.main button{background:none;border:none;padding:14px 18px;font-size:14px;font-weight:600;color:var(--muted);letter-spacing:0.3px;border-bottom:3px solid transparent;white-space:nowrap;}
nav.main button.active{color:var(--navy);border-bottom-color:var(--gold);}
nav.main button:hover{color:var(--navy);}

/* ---------- Layout ---------- */
main{max-width:1180px;margin:0 auto;padding:40px 24px 100px;min-height:60vh;}
.page{display:none;}
.page.active{display:block;}
.section-title{font-family:var(--serif);font-size:15px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:0 0 6px;}
.page-title{font-family:var(--serif);font-size:34px;color:var(--navy);margin:0 0 30px;padding-bottom:16px;border-bottom:2px solid var(--navy);}
.subhead{font-family:var(--serif);font-size:20px;color:var(--navy);margin:36px 0 16px;display:flex;align-items:center;gap:10px;}
.subhead::before{content:"";width:8px;height:8px;background:var(--gold);border-radius:50%;flex-shrink:0;}
.add-btn{background:var(--navy);color:#fff;border:none;padding:8px 16px;border-radius:2px;font-size:13px;font-weight:600;margin-left:auto;}
.add-btn:hover{background:var(--navy-2);}
.row-with-add{display:flex;align-items:center;gap:10px;}
.empty-note{color:var(--muted);font-size:14px;padding:20px 0;font-style:italic;}

/* ---------- Home hero ---------- */
.hero-wrap{position:relative;border:1px solid var(--line);background:var(--paper);width:80%;margin:0 auto;}
.hero-slide{display:none;position:relative;}
.hero-slide.show{display:block;}
.hero-slide img{width:100%;height:auto;display:block;}
.hero-slide .no-img-placeholder{width:100%;height:456px;background:linear-gradient(135deg,var(--navy),var(--navy-2));}
.hero-slide .cap{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(to top, rgba(19,42,70,0.92), rgba(19,42,70,0));color:#fff;padding:36px 28px 18px;font-family:var(--serif);font-size:19px;line-height:1.4;}
.hero-dots{display:flex;gap:8px;justify-content:center;padding:14px;background:var(--paper);}
.hero-dots span{width:8px;height:8px;border-radius:50%;background:var(--line);cursor:pointer;}
.hero-dots span.on{background:var(--gold);}
.hero-empty{height:456px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-style:italic;}

.journal-list{margin-top:28px;}
.journal-item{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--line);align-items:center;}
.journal-item img{width:64px;height:64px;object-fit:cover;border-radius:3px;flex-shrink:0;background:var(--line);}
.journal-item .jt{font-size:15px;font-weight:500;}
.journal-item .jt small{display:block;color:var(--muted);font-size:12.5px;margin-top:3px;}
.jr-controls{margin-left:auto;display:flex;gap:8px;}

/* ---------- Cards / generic entries ---------- */
.entry-card{background:var(--paper);border:1px solid var(--line);border-radius:3px;padding:20px 22px;margin-bottom:14px;position:relative;}
.entry-card .edit-controls{position:absolute;top:14px;right:16px;display:flex;gap:10px;}
.edit-controls button{background:none;border:none;font-size:12px;color:var(--muted);text-decoration:underline;}
.edit-controls button.del{color:var(--red);}
.entry-card .date-tag{font-family:var(--mono);font-size:11.5px;color:var(--gold);letter-spacing:0.5px;}
.entry-card p{margin:6px 0 0;}

/* Professor */
.prof-photo-wrap{display:flex;gap:34px;align-items:flex-start;margin-bottom:10px;}
.prof-photo{width:180px;height:auto;display:block;background:var(--line);border-radius:2px;border:1px solid var(--line);}
.prof-photo-empty{width:180px;height:220px;background:var(--line);border-radius:2px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center;}
.prof-intro h2{font-family:var(--serif);font-size:26px;margin:0 0 6px;color:var(--navy);}
.prof-intro p{color:var(--muted);margin:0;}
.prof-links{display:flex;gap:10px;margin-top:12px;align-items:center;}
.prof-link-badge{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;letter-spacing:-0.3px;transition:.15s;flex-shrink:0;}
.prof-link-badge:hover{transform:translateY(-2px);filter:brightness(1.08);}
.prof-link-badge.linkedin{background:#0A66C2;}
.prof-link-badge.scholar{background:#4285F4;}
.prof-link-badge.researchgate{background:#00CCBB;}
.prof-link-badge.orcid{background:#A6CE39;color:#1B1B1B;}
.prof-link-badge.empty{background:var(--line);color:var(--muted);cursor:default;}

/* Members */
.member-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
.member-card{background:var(--paper);border:1px solid var(--line);border-radius:3px;overflow:hidden;position:relative;}
.member-photo{width:100%;height:auto;display:block;background:var(--line);}
.member-photo-empty{width:100%;height:240px;background:var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;}
.member-info{padding:14px 16px;font-size:13.5px;}
.member-info .deg{font-weight:700;color:var(--navy);font-size:15px;margin-bottom:6px;}
.member-info div{margin-bottom:4px;}
.member-info .lbl{color:var(--gold);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:0.4px;}

.alumni-table{width:100%;border-collapse:collapse;font-size:13.5px;background:var(--paper);table-layout:fixed;}
.alumni-table th{background:var(--navy);color:#fff;font-weight:600;padding:10px 12px;text-align:left;font-size:12px;}
.alumni-table td{padding:10px 12px;border-bottom:1px solid var(--line);}
.alumni-table tr:hover td{background:#fbfaf7;}

/* Research */
.research-list{display:flex;flex-direction:column;gap:28px;}
.research-row{display:flex;gap:24px;background:var(--paper);border:1px solid var(--line);border-radius:3px;padding:20px;position:relative;}
.research-row .research-img-wrap{flex:0 0 60%;max-width:60%;border-radius:3px;overflow:hidden;background:var(--line);align-self:flex-start;}
.research-row .research-img-wrap img{width:100%;height:auto;display:block;}
.research-row .research-img-empty{width:100%;height:300px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;}
.research-row .research-text{flex:1;min-width:0;}
.research-row .research-text h4{font-family:var(--serif);font-size:19px;margin:0 0 10px;color:var(--navy);}
.research-row .research-text p{font-size:14px;color:var(--ink);white-space:pre-wrap;margin:0;}
@media(max-width:800px){
  .research-row{flex-direction:column;}
  .research-row .research-img-wrap{flex:0 0 auto;max-width:100%;}
}

/* Publications */
.year-head{display:flex;align-items:baseline;gap:10px;font-family:var(--serif);font-size:22px;color:var(--navy);margin:34px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--line);}
.year-head .count{font-family:var(--mono);font-size:15px;color:var(--gold);}
.pub-item{display:flex;gap:14px;padding:16px 0;border-bottom:1px dashed var(--line);}
.pub-num{font-family:var(--mono);font-weight:600;color:var(--muted);flex-shrink:0;width:34px;}
.pub-image{flex:0 0 30%;max-width:30%;border-radius:3px;overflow:hidden;background:var(--line);border:1px solid var(--line);align-self:flex-start;}
.pub-image img{width:100%;height:auto;display:block;}
.pub-body{flex:1;min-width:0;}
.pub-body p{margin:0 0 4px;}
.pub-highlight{color:var(--red);font-size:12.5px;font-weight:600;margin-top:4px;}
.pub-meta{color:var(--muted);font-size:12.5px;}
.pub-item .edit-controls{position:static;margin-top:6px;}
@media(max-width:640px){
  .pub-item{flex-wrap:wrap;}
  .pub-image{flex:0 0 100%;max-width:100%;order:1;}
  .pub-body{order:2;flex:1 1 100%;}
}

/* Patents */
.patent-item{border-bottom:1px solid var(--line);padding:18px 0;}
.patent-item p{margin:3px 0;font-size:14px;}
.patent-num{font-family:var(--mono);font-weight:700;color:var(--gold);margin-right:6px;}
.family-block{margin-top:10px;padding:12px 16px;background:#faf8f2;border-left:3px solid var(--gold-soft);}
.family-block .flabel{font-size:11.5px;text-transform:uppercase;letter-spacing:0.5px;color:var(--gold);font-weight:700;margin-bottom:4px;}
.filing-line{display:flex;flex-wrap:wrap;gap:4px 18px;font-size:13.5px;color:var(--ink);padding:2px 0;}
.filing-country{font-weight:700;color:var(--navy);min-width:44px;}
.filing-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px;background:#faf8f2;padding:8px;border-radius:2px;}
.filing-row input{padding:7px 9px;border:1px solid var(--line);border-radius:2px;font-size:13px;font-family:var(--sans);background:#fdfcfa;}
.filing-row .fl-country{width:80px;}
.filing-row .fl-appnum{width:150px;}
.filing-row .fl-appdate{width:135px;}
.filing-row .fl-regnum{width:150px;}
.filing-row .fl-regdate{width:135px;}
.filing-row button{background:none;border:none;color:var(--red);font-size:16px;}

/* Presentations */
.pres-item{padding:14px 0;border-bottom:1px solid var(--line);font-size:14.5px;}
.pres-num{font-family:var(--mono);font-weight:700;color:var(--muted);margin-right:6px;}
.pres-tag{font-weight:600;color:var(--navy);}

/* Notice */
.notice-item{padding:18px 0;border-bottom:1px solid var(--line);}
.notice-date{font-family:var(--mono);font-size:12px;color:var(--gold);margin-bottom:6px;}
.notice-text{font-size:15px;white-space:pre-wrap;}
.notice-photo-wrap{display:flex;justify-content:center;margin-top:14px;}
.notice-photo{width:60%;height:auto;display:block;border-radius:3px;border:1px solid var(--line);}
@media(max-width:800px){
  .notice-photo{width:100%;}
}

/* ---------- Modal ---------- */
.modal-backdrop{position:fixed;inset:0;background:rgba(19,42,70,0.55);z-index:1000;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 16px;}
.modal-backdrop.show{display:flex;}
.modal{background:#fff;border-radius:4px;max-width:640px;width:100%;padding:28px 30px 30px;}
.modal h3{font-family:var(--serif);color:var(--navy);margin:0 0 18px;font-size:22px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--navy);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.3px;}
.field input[type=text], .field input[type=date], .field input[type=number], .field textarea, .field select{
  width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:2px;font-family:var(--sans);font-size:14px;background:#fdfcfa;
}
.field textarea{min-height:70px;resize:vertical;}
.field-row{display:flex;gap:12px;}
.field-row .field{flex:1;}
.check-row{display:flex;align-items:center;gap:8px;font-size:13.5px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;}
.btn-primary{background:var(--navy);color:#fff;border:none;padding:10px 22px;border-radius:2px;font-weight:600;font-size:14px;}
.btn-secondary{background:none;border:1px solid var(--line);color:var(--muted);padding:10px 22px;border-radius:2px;font-size:14px;}
.author-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;background:#faf8f2;padding:8px;border-radius:2px;}
.author-row input[type=text]{flex:2;}
.author-row select{flex:1;}
.author-row button{background:none;border:none;color:var(--red);font-size:16px;}
#authorList{margin-bottom:8px;}
.small-note{font-size:12px;color:var(--muted);margin-top:4px;}
.file-preview{margin-top:8px;max-width:150px;max-height:150px;border-radius:2px;border:1px solid var(--line);}

/* citation preview */
.cite-preview{background:#faf8f2;border:1px solid var(--gold-soft);border-radius:3px;padding:14px 16px;font-size:13.5px;margin-top:8px;}
.jt-italic{font-style:italic;}
.jt-bold{font-weight:700;}
.jt-blue{color:var(--blue);font-weight:600;}
.jhk{font-weight:700;text-decoration:underline;}
.jhk-corr{color:var(--red);font-weight:700;}

footer.site{text-align:center;padding:26px;color:var(--muted);font-size:12.5px;border-top:1px solid var(--line);background:var(--paper);}

@media(max-width:640px){
  .brand-text .name{font-size:20px;}
  .brand-text .full{display:none;}
  .prof-photo-wrap{flex-direction:column;}
  .page-title{font-size:26px;}
  .member-grid{grid-template-columns:1fr;}
  .hero-wrap{width:100%;}
  .hero-empty, .hero-slide .no-img-placeholder{height:280px;}
}
@media(min-width:641px) and (max-width:900px){
  .member-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

/* ================= STORAGE HELPERS =================
   Data is stored in Firebase Firestore, a free shared cloud database.
   This means content added or edited by the admin is saved online and
   shows up for EVERY visitor, on every browser/device — not just the
   browser that made the edit. */
async function loadKey(key, fallback){
  try{
    const doc = await fsDb.collection('bmiel').doc(key).get();
    if(doc.exists && doc.data().value !== undefined){
      return JSON.parse(doc.data().value);
    }
    return fallback;
  }catch(e){
    console.error('load failed', key, e);
    return fallback;
  }
}
async function saveKey(key, value, opts){
  const silent = opts && opts.silent;
  try{
    await fsDb.collection('bmiel').doc(key).set({ value: JSON.stringify(value) });
    return true;
  }catch(e){
    console.error('save failed', key, e);
    if(!silent){ alert('Save failed — please check your internet connection and try again. (If this keeps happening, an uploaded photo may be too large — try a smaller image.)'); }
    return false;
  }
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
async function sha256Hex(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ================= NAV / ROUTING ================= */
function buildNav(){
  const nav = document.getElementById('mainNav');
  nav.innerHTML = PAGES.map(p=>`<button data-page="${p.id}" onclick="goTo('${p.id}')">${p.label}</button>`).join('');
}
function goTo(page){
  currentPage = page;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('nav.main button').forEach(b=>b.classList.toggle('active', b.dataset.page===page));
  renderPage(page);
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderPage(page){
  if(page==='home') renderHome();
  if(page==='professor') renderProfessor();
  if(page==='member') renderMember();
  if(page==='research') renderResearch();
  if(page==='publication') renderPublication();
  if(page==='ip') renderIP();
  if(page==='presentation') renderPresentation();
  if(page==='notice') renderNotice();
}

/* ================= IMAGE STORAGE (Firestore, free tier — no Storage/Blaze needed) =================
   Every image is compressed, then saved as its OWN small Firestore document in the
   'bmiel_images' collection (one image per document, safely under the 1MB-per-document
   limit). Only a short reference id (e.g. "img_ab12cd") is stored on the actual
   record (member, publication, journal, etc.) — never the image data itself — so
   those main records stay tiny no matter how many images accumulate over time.
   imageCache holds already-fetched images in memory so templates can render
   synchronously via imgSrc(ref). */
const imageCache = new Map();
function blobToDataURL(blob){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=>resolve(r.result);
    r.onerror = ()=>reject(r.error);
    r.readAsDataURL(blob);
  });
}
function imgSrc(ref){
  if(!ref) return '';
  if(typeof ref==='string' && ref.startsWith('img_')) return imageCache.get(ref) || '';
  return ref; // backward-compatible: old entries may hold a full data URL or an http(s) URL directly
}
function collectImageRefs(){
  const refs = new Set();
  const add = v=>{ if(typeof v==='string' && v.startsWith('img_')) refs.add(v); };
  add(DB.logo); add(DB.profPhoto);
  (DB.journals||[]).forEach(x=>add(x.image));
  (DB.notices||[]).forEach(x=>add(x.photo));
  (DB.homeNotices||[]).forEach(x=>add(x.photo));
  (DB.membersCurrent||[]).forEach(x=>add(x.photo));
  (DB.research||[]).forEach(x=>add(x.image));
  (DB.publications||[]).forEach(x=>add(x.image));
  return Array.from(refs);
}
async function preloadImages(){
  const ids = collectImageRefs().filter(id=>!imageCache.has(id));
  if(ids.length===0) return;
  const CHUNK = 30; // Firestore 'in' query limit
  for(let i=0;i<ids.length;i+=CHUNK){
    const chunk = ids.slice(i, i+CHUNK);
    try{
      const snap = await fsDb.collection('bmiel_images').where(firebase.firestore.FieldPath.documentId(), 'in', chunk).get();
      snap.forEach(doc=> imageCache.set(doc.id, doc.data().data));
    }catch(e){ console.error('image preload failed', e); }
  }
}
function loadImageElementFromFile(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=>{
      const img = new Image();
      img.onload = ()=>resolve(img);
      img.onerror = ()=>reject(new Error('Could not read this image file.'));
      img.src = r.result;
    };
    r.onerror = ()=>reject(r.error);
    r.readAsDataURL(file);
  });
}
function resizeImageToBlob(img, maxDim, quality){
  let {width, height} = img;
  if(width > maxDim || height > maxDim){
    if(width >= height){ height = Math.round(height * (maxDim/width)); width = maxDim; }
    else{ width = Math.round(width * (maxDim/height)); height = maxDim; }
  }
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, width, height);
  return new Promise(resolve=> canvas.toBlob(b=>resolve(b), 'image/jpeg', quality));
}
async function uploadImageAndGetURL(input){
  if(!input.files || !input.files[0]) return null;
  const f = input.files[0];
  if(f.size > 15*1024*1024){ alert('Image too large — please use an image under 15MB.'); return null; }
  try{
    const img = await loadImageElementFromFile(f);
    let blob = await resizeImageToBlob(img, 1000, 0.72);
    let dataUrl = await blobToDataURL(blob);
    if(dataUrl.length > 900*1024){
      blob = await resizeImageToBlob(img, 800, 0.5);
      dataUrl = await blobToDataURL(blob);
    }
    if(dataUrl.length > 900*1024){
      alert('This image is still too large after compression — please try a smaller or simpler image.');
      return null;
    }
    const imageId = 'img_' + uid();
    await fsDb.collection('bmiel_images').doc(imageId).set({ data: dataUrl });
    imageCache.set(imageId, dataUrl); // available immediately, no reload needed
    return imageId;
  }catch(e){
    console.error('image upload failed', e);
    alert('Image upload failed — please check your internet connection and try again.');
    return null;
  }
}

function readFileAsDataURL(input){
  // Images are resized/compressed before storing because Firestore documents
  // have a hard 1MB size limit, and this app stores each data key (which can
  // hold several images, e.g. journals or notices) as a single document.
  return new Promise((resolve,reject)=>{
    if(!input.files || !input.files[0]){ resolve(null); return; }
    const f = input.files[0];
    if(f.size > 15*1024*1024){ alert('Image too large — please use an image under 15MB.'); resolve(null); return; }
    const r = new FileReader();
    r.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        const MAX_DIM = 1000; // longest side, in pixels
        let {width, height} = img;
        if(width > MAX_DIM || height > MAX_DIM){
          if(width >= height){ height = Math.round(height * (MAX_DIM/width)); width = MAX_DIM; }
          else{ width = Math.round(width * (MAX_DIM/height)); height = MAX_DIM; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        // JPEG compression keeps file size small; falls back to the original if compression fails
        let dataUrl;
        try{ dataUrl = canvas.toDataURL('image/jpeg', 0.72); }catch(e){ dataUrl = r.result; }
        if(!dataUrl || dataUrl.length > 900*1024){
          // still too big after compression at this quality — compress harder
          try{ dataUrl = canvas.toDataURL('image/jpeg', 0.45); }catch(e){ /* keep previous */ }
        }
        if(dataUrl && dataUrl.length > 900*1024){
          alert('This image is still too large after compression — please try a smaller or simpler image.');
          resolve(null); return;
        }
        resolve(dataUrl);
      };
      img.onerror = ()=>{ alert('Could not read this image file.'); resolve(null); };
      img.src = r.result;
    };
    r.onerror = ()=>reject(r.error);
    r.readAsDataURL(f);
  });
}

function enrollKey(m){
  if(!m.enrollYear) return 999999;
  return m.enrollYear*100 + (m.enrollMonth||1);
}
function pubSortValue(p){
  return p.pubDate || p.onlineDate || (p.year? p.year+'.00.00' : '');
}
function memberConfSortValue(c){
  return c.sortDate || '';
}
function getMemberPubLinks(m){
  // New format: m.pubLinks = [{pubId, role}]. Old format (pre-role feature): m.publicationIds = ['id', ...].
  if(m.pubLinks) return m.pubLinks;
  if(m.publicationIds) return m.publicationIds.map(id=>({pubId:id, role:''}));
  return [];
}
function memberRoleLabel(role){
  if(role==='first') return '1st Author';
  if(role==='co') return 'Co-author';
  if(role==='corr') return 'Corresponding Author';
  return '';
}
function alumniDegreeLines(a){
  // Order: Post.Doc., Post.M.S., Degree, Post-Undergraduate, Undergraduate intern
  const parts = [];
  if(a.hasPostDoc || a.hasPostMS || a.hasDegree || a.hasPostUndergrad || a.hasUndergradIntern){
    if(a.hasPostDoc) parts.push('Post.Doc.'+(a.postDocText?'<br>'+esc(a.postDocText):''));
    if(a.hasPostMS) parts.push('Post.M.S.'+(a.postMSText?'<br>'+esc(a.postMSText):''));
    if(a.hasDegree) parts.push((a.degreeType||'Degree')+(a.degreeText?'<br>'+esc(a.degreeText):''));
    if(a.hasPostUndergrad) parts.push('Post-Undergraduate'+(a.postUndergradText?'<br>'+esc(a.postUndergradText):''));
    if(a.hasUndergradIntern) parts.push('Undergraduate intern'+(a.undergradInternText?'<br>'+esc(a.undergradInternText):''));
  } else if(a.degree){
    // backward-compatible fallback for older records saved before this structured format existed
    parts.push(esc(a.degree));
  }
  return parts.join('<br>');
}

/* =========================================================
   PUBLICATION
========================================================= */
let currentAuthors = []; // working array while editing a publication

function fmtDot(iso){
  if(!iso) return '';
  return iso.replace(/-/g,'.');
}
function pubDateKey(p){
  return p.pubDate || p.onlineDate || '0000-00-00';
}
function renderPublication(){
  const el = document.getElementById('page-publication');
  const sciePubs = DB.publications.filter(p=>p.category!=='nonscie');
  const nonsciePubs = DB.publications.filter(p=>p.category==='nonscie');

  // SCIE: assign ascending numbers by publication date (oldest = 1, newest = highest)
  const scieAsc = [...sciePubs].sort((a,b)=> pubDateKey(a).localeCompare(pubDateKey(b)));
  scieAsc.forEach((p,i)=>p._num = i+1);
  const years = [...new Set(sciePubs.map(p=>p.year))].sort((a,b)=>b-a);
  let scieBody = '';
  years.forEach(y=>{
    const items = sciePubs.filter(p=>p.year===y).sort((a,b)=> pubDateKey(b).localeCompare(pubDateKey(a)));
    scieBody += `<div class="year-head">${y} <span class="count">[${items.length}]</span></div>`;
    items.forEach(p=>{ scieBody += renderPubItem(p); });
  });

  // Non-SCIE: no dates available, so number ascending by add order (newest addition = highest number, shown first)
  const nonscieAsc = [...nonsciePubs].sort((a,b)=> a.addedAt-b.addedAt);
  nonscieAsc.forEach((p,i)=>p._num = i+1);
  const nonscieDisp = [...nonsciePubs].sort((a,b)=> b.addedAt-a.addedAt);
  let nonscieBody = nonscieDisp.map(p=>renderPubItem(p)).join('');

  el.innerHTML = `
    <div class="section-title">Research Output</div>
    <div class="row-with-add"><h1 class="page-title" style="border:none;margin:0;padding:0;">Publication</h1>
      ${isAdmin? `<button class="add-btn" onclick="openPublicationForm(null,'scie')">+ Add publication</button>`:''}
    </div>
    <div style="border-bottom:2px solid var(--navy);margin-bottom:10px;"></div>
    ${sciePubs.length===0? `<div class="empty-note">No publications yet.</div>` : scieBody}

    <div class="row-with-add" style="margin-top:40px;">
      <div class="subhead">Non-SCIE</div>
      ${isAdmin? `<button class="add-btn" onclick="openPublicationForm(null,'nonscie')">+ Add Non-SCIE publication</button>`:''}
    </div>
    ${nonsciePubs.length===0? `<div class="empty-note">No Non-SCIE publications yet.</div>` : nonscieBody}
  `;
}
function formatAuthorName(a){
  const isJihoon = a.name.trim().toLowerCase() === 'jihoon kim';
  let sup = '';
  if(a.role==='first') sup = '<sup>+</sup>';
  if(a.role==='corr') sup = '<sup>*</sup>';
  let nameHtml = esc(a.name);
  if(isJihoon){
    nameHtml = `<span class="jhk">${nameHtml}</span>`;
  }
  let extra = '';
  if(isJihoon && a.role==='corr' && a.corrType){
    extra = ` <span class="jhk-corr">(${esc(a.corrType)})</span>`;
  }
  return `${nameHtml}${sup}${extra}`;
}
function pubTitleHtml(p){
  if(p.link){
    return `<a href="${esc(p.link)}" target="_blank" rel="noopener noreferrer" style="color:var(--navy);text-decoration:underline;">${esc(p.title)}</a>`;
  }
  return esc(p.title);
}
function renderPubItem(p){
  const authorsHtml = p.authors.map(formatAuthorName).join(', ');
  if(p.category==='nonscie'){
    return `
      <div class="pub-item">
        <div class="pub-num">${p._num}.</div>
        <div class="pub-body">
          <p>${authorsHtml}, ${pubTitleHtml(p)}. <span class="jt-italic">${esc(p.journal)}</span>, <span class="jt-bold">${p.year}</span>${p.issue?`, <span class="jt-italic">${esc(p.issue)}</span>`:''}${p.page?`, ${esc(p.page)}`:''}.</p>
          ${isAdmin? `<div class="edit-controls">
            <button onclick="openPublicationForm('${p.id}','nonscie')">Edit</button>
            <button class="del" onclick="deletePublication('${p.id}')">Delete</button>
          </div>`:''}
        </div>
      </div>
    `;
  }
  return `
    <div class="pub-item">
      <div class="pub-num">${p._num}.</div>
      ${p.image? `<div class="pub-image"><img src="${imgSrc(p.image)}" alt=""></div>` : ''}
      <div class="pub-body">
        <p>${authorsHtml}, ${pubTitleHtml(p)}. <span class="jt-italic">${esc(p.journal)}</span>, <span class="jt-bold">${p.year}</span>, ${p.issue?`<span class="jt-italic">${esc(p.issue)}</span>, `:''}${esc(p.page)} ${p.ifValue?`(<span class="jt-blue">${p.ifYear?p.ifYear+' IF='+p.ifValue:'IF='+p.ifValue}${p.jifPercentile?', '+esc(p.jifPercentile):''}</span>)`:''} ${p.pubDate?'– '+fmtDot(p.pubDate):''}${p.onlineDate?' (Online: '+fmtDot(p.onlineDate)+')':''}.</p>
        ${p.highlighted? `<div class="pub-highlight">– Highlighted in BRIC.org</div>`:''}
        ${isAdmin? `<div class="edit-controls">
          <button onclick="openPublicationForm('${p.id}','scie')">Edit</button>
          <button class="del" onclick="deletePublication('${p.id}')">Delete</button>
        </div>`:''}
      </div>
    </div>
  `;
}
function authorRowHtml(a){
  return `
    <div class="author-row" data-id="${a._rid}">
      <input type="text" class="a-name" value="${esc(a.name)}" placeholder="Author name">
      <select class="a-role" onchange="onAuthorRoleChange(this)">
        <option value="middle" ${a.role==='middle'?'selected':''}>Co-author</option>
        <option value="first" ${a.role==='first'?'selected':''}>1st author</option>
        <option value="corr" ${a.role==='corr'?'selected':''}>Corresponding author</option>
      </select>
      <select class="a-corrtype" style="display:${a.role==='corr'?'inline-block':'none'};">
        <option value="Corresponding author" ${a.corrType==='Corresponding author'?'selected':''}>Corresponding author</option>
        <option value="Co-Corresponding author" ${a.corrType==='Co-Corresponding author'?'selected':''}>Co-Corresponding author</option>
      </select>
      <button onclick="removeAuthorRow('${a._rid}')" title="Remove">✕</button>
    </div>
  `;
}
function onAuthorRoleChange(sel){
  const row = sel.closest('.author-row');
  row.querySelector('.a-corrtype').style.display = sel.value==='corr' ? 'inline-block':'none';
}
function removeAuthorRow(rid){
  currentAuthors = currentAuthors.filter(a=>a._rid!==rid);
  document.getElementById('authorList').innerHTML = currentAuthors.map(authorRowHtml).join('');
}
function addAuthorRow(){
  syncAuthorsFromDom();
  currentAuthors.push({_rid:uid(), name:'', role:'middle', corrType:'Corresponding author'});
  document.getElementById('authorList').innerHTML = currentAuthors.map(authorRowHtml).join('');
}
function syncAuthorsFromDom(){
  const rows = document.querySelectorAll('#authorList .author-row');
  rows.forEach(row=>{
    const rid = row.dataset.id;
    const a = currentAuthors.find(x=>x._rid===rid);
    if(!a) return;
    a.name = row.querySelector('.a-name').value.trim();
    a.role = row.querySelector('.a-role').value;
    a.corrType = row.querySelector('.a-corrtype').value;
  });
}
function openPublicationForm(id, category){
  const existing = id? DB.publications.find(p=>p.id===id): null;
  const cat = existing ? (existing.category==='nonscie'?'nonscie':'scie') : (category||'scie');
  currentAuthors = existing? existing.authors.map(a=>({...a,_rid:uid()})) : [{_rid:uid(),name:'',role:'first',corrType:'Corresponding author'}];
  const f = existing || {};

  if(cat==='nonscie'){
    showModal(existing?'Edit Non-SCIE Publication':'Add Non-SCIE Publication', `
      <div class="field"><label>Authors</label>
        <div id="authorList">${currentAuthors.map(authorRowHtml).join('')}</div>
        <button class="btn-secondary" type="button" onclick="addAuthorRow()">+ Add author</button>
        <p class="small-note">Select each author's role. If Jihoon Kim is marked "Corresponding author," also choose whether it's sole or co-corresponding.</p>
      </div>
      <div class="field"><label>Title</label><textarea id="pTitle">${esc(f.title||'')}</textarea></div>
      <div class="field"><label>Journal Name</label><input type="text" id="pJournal" value="${esc(f.journal||'')}"></div>
      <div class="field-row">
        <div class="field"><label>Year</label><input type="number" id="pYear" value="${f.year||new Date().getFullYear()}"></div>
        <div class="field"><label>Issue / Volume</label><input type="text" id="pIssue" value="${esc(f.issue||'')}"></div>
        <div class="field"><label>Page</label><input type="text" id="pPage" value="${esc(f.page||'')}"></div>
      </div>
    `, async ()=>{
      syncAuthorsFromDom();
      const authors = currentAuthors.filter(a=>a.name).map(({_rid,...rest})=>rest);
      if(authors.length===0){ alert('Please add at least one author.'); return; }
      const title = document.getElementById('pTitle').value.trim();
      const journal = document.getElementById('pJournal').value.trim();
      if(!title || !journal){ alert('Please enter title and journal name.'); return; }
      const data = {
        category: 'nonscie',
        authors, title, journal,
        year: +document.getElementById('pYear').value,
        issue: document.getElementById('pIssue').value.trim(),
        page: document.getElementById('pPage').value.trim(),
      };
      if(existing){
        // clear any leftover SCIE-only fields when converting an entry to Non-SCIE
        delete existing.link; delete existing.image; delete existing.ifYear; delete existing.ifValue;
        delete existing.jifPercentile; delete existing.pubDate; delete existing.onlineDate; delete existing.highlighted;
        Object.assign(existing, data);
      }
      else{ DB.publications.push({id:uid(), ...data, addedAt:Date.now()}); }
      await saveKey('bmiel-publications', DB.publications);
      closeModal(); renderPublication();
    });
    return;
  }

  let tempPubImage = f.image || null;
  showModal(existing?'Edit Publication':'Add Publication', `
    <div class="field"><label>Authors</label>
      <div id="authorList">${currentAuthors.map(authorRowHtml).join('')}</div>
      <button class="btn-secondary" type="button" onclick="addAuthorRow()">+ Add author</button>

function earliestFilingDate(filings){
  return (filings||[]).reduce((min,f)=> (f.appDate && (!min || f.appDate<min)) ? f.appDate : min, '');
}
function renderFilingLines(filings){
  return (filings||[]).map(f=>`
    <div class="filing-line">
      <span class="filing-country">${esc(f.country)}</span>
      <span>App. No. ${esc(f.appNum)}${f.appDate?' ('+fmtDot(f.appDate)+')':''}</span>
      ${f.regNum? `<span>Reg. No. ${esc(f.regNum)}${f.regDate?' ('+fmtDot(f.regDate)+')':''}</span>` : ''}
    </div>
  `).join('');
}
function renderIP(){
  const el = document.getElementById('page-ip');
  const sortedAsc = [...DB.patents].sort((a,b)=>earliestFilingDate(a.filings).localeCompare(earliestFilingDate(b.filings)));
  sortedAsc.forEach((p,i)=>p._num=i+1);
  const displayList = [...DB.patents].sort((a,b)=>earliestFilingDate(b.filings).localeCompare(earliestFilingDate(a.filings)));
  el.innerHTML = `
    <div class="section-title">Patents</div>
    <div class="row-with-add"><h1 class="page-title" style="border:none;margin:0;padding:0;">Intellectual Property</h1>
      ${isAdmin? `<button class="add-btn" onclick="openPatentForm()">+ Add patent</button>`:''}
    </div>
    <div style="border-bottom:2px solid var(--navy);margin-bottom:10px;"></div>
    ${displayList.length===0? `<div class="empty-note">No patents yet.</div>` : displayList.map(p=>`
      <div class="patent-item">
        <p><span class="patent-num">${p._num}.</span>${esc(p.inventors)}, ${esc(p.title)}</p>
        ${renderFilingLines(p.filings)}
        ${p.hasFamily? `<div class="family-block">
          <div class="flabel">Family Patents</div>
          <p>${esc(p.famInventors)}, ${esc(p.famTitle)}</p>
          ${renderFilingLines(p.famFilings)}
        </div>`:''}
        ${isAdmin? `<div class="edit-controls" style="position:static;margin-top:8px;">
          <button onclick="openPatentForm('${p.id}')">Edit</button>
          <button class="del" onclick="deletePatent('${p.id}')">Delete</button>
        </div>`:''}
      </div>
    `).join('')}
  `;
}
let currentFilings = [];
let currentFamFilings = [];
function filingRowHtml(f, prefix){
  return `
    <div class="filing-row" data-id="${f._rid}">
      <input type="text" class="fl-country" placeholder="Country" value="${esc(f.country||'')}">
      <input type="text" class="fl-appnum" placeholder="Application No." value="${esc(f.appNum||'')}">
      <input type="date" class="fl-appdate" value="${f.appDate||''}">
      <input type="text" class="fl-regnum" placeholder="Registration No. (optional)" value="${esc(f.regNum||'')}">
      <input type="date" class="fl-regdate" value="${f.regDate||''}">
      <button type="button" onclick="removeFilingRow('${prefix}','${f._rid}')" title="Remove">✕</button>
    </div>
  `;
}
function filingArrFor(prefix){ return prefix==='main'? currentFilings : currentFamFilings; }
function addFilingRow(prefix){
  syncFilingsFromDom(prefix);
  const arr = filingArrFor(prefix);
  arr.push({_rid:uid(), country:'', appNum:'', appDate:'', regNum:'', regDate:''});
  document.getElementById(prefix+'FilingList').innerHTML = arr.map(f=>filingRowHtml(f,prefix)).join('');
}
function removeFilingRow(prefix, rid){
  if(prefix==='main'){ currentFilings = currentFilings.filter(f=>f._rid!==rid); }
  else{ currentFamFilings = currentFamFilings.filter(f=>f._rid!==rid); }
  const arr = filingArrFor(prefix);
  document.getElementById(prefix+'FilingList').innerHTML = arr.map(f=>filingRowHtml(f,prefix)).join('');
}
function syncFilingsFromDom(prefix){
  const arr = filingArrFor(prefix);
  const listEl = document.getElementById(prefix+'FilingList');
  if(!listEl) return;
  const rows = listEl.querySelectorAll('.filing-row');
  rows.forEach(row=>{
    const rid = row.dataset.id;
    const f = arr.find(x=>x._rid===rid);
    if(!f) return;
    f.country = row.querySelector('.fl-country').value.trim();
    f.appNum = row.querySelector('.fl-appnum').value.trim();
    f.appDate = row.querySelector('.fl-appdate').value;
    f.regNum = row.querySelector('.fl-regnum').value.trim();
    f.regDate = row.querySelector('.fl-regdate').value;
  });
}
function toggleFamilyFields(){
  const on = document.getElementById('ipHasFamily').checked;
  document.getElementById('familyFields').style.display = on? 'block':'none';
}
function openPatentForm(id){
  const existing = id? DB.patents.find(p=>p.id===id): null;
  const f = existing || {};
  currentFilings = (f.filings&&f.filings.length? f.filings : [{country:'',appNum:'',appDate:'',regNum:'',regDate:''}]).map(x=>({...x,_rid:uid()}));
  currentFamFilings = (f.famFilings&&f.famFilings.length? f.famFilings : [{country:'',appNum:'',appDate:'',regNum:'',regDate:''}]).map(x=>({...x,_rid:uid()}));
  showModal(existing?'Edit Patent':'Add Patent', `
    <div class="field"><label>Inventor(s)</label><input type="text" id="ipInventors" value="${esc(f.inventors||'')}"></div>
    <div class="field"><label>Title</label><textarea id="ipTitle">${esc(f.title||'')}</textarea></div>
    <div class="field"><label>Filings (one row per country/region)</label>
      <div id="mainFilingList">${currentFilings.map(x=>filingRowHtml(x,'main')).join('')}</div>
      <button class="btn-secondary" type="button" onclick="addFilingRow('main')">+ Add filing</button>
    </div>
    <div class="check-row"><input type="checkbox" id="ipHasFamily" ${f.hasFamily?'checked':''} onchange="toggleFamilyFields()"> <label for="ipHasFamily" style="margin:0;text-transform:none;font-weight:400;">Has family patent(s)</label></div>
    <div id="familyFields" style="display:${f.hasFamily?'block':'none'};margin-top:12px;padding:14px;background:#faf8f2;border-radius:2px;">
      <div class="field"><label>Family Inventor(s)</label><input type="text" id="ipFamInventors" value="${esc(f.famInventors||'')}"></div>
      <div class="field"><label>Family Title</label><textarea id="ipFamTitle">${esc(f.famTitle||'')}</textarea></div>
      <div class="field"><label>Family Filings (one row per country/region)</label>
        <div id="famFilingList">${currentFamFilings.map(x=>filingRowHtml(x,'fam')).join('')}</div>
        <button class="btn-secondary" type="button" onclick="addFilingRow('fam')">+ Add family filing</button>
      </div>
    </div>
  `, async ()=>{
    const inventors = document.getElementById('ipInventors').value.trim();
    const title = document.getElementById('ipTitle').value.trim();
    if(!inventors||!title){ alert('Please enter inventors and title.'); return; }
    syncFilingsFromDom('main');
    const filings = currentFilings.filter(x=>x.country||x.appNum).map(({_rid,...rest})=>rest);
    if(filings.length===0){ alert('Please add at least one filing (country + application number).'); return; }
    const hasFamily = document.getElementById('ipHasFamily').checked;
    let famFilings = [];
    if(hasFamily){
      syncFilingsFromDom('fam');
      famFilings = currentFamFilings.filter(x=>x.country||x.appNum).map(({_rid,...rest})=>rest);
    }
    const data = {
      inventors, title, filings,
      hasFamily,
      famInventors: hasFamily? document.getElementById('ipFamInventors').value.trim(): '',
      famTitle: hasFamily? document.getElementById('ipFamTitle').value.trim(): '',
      famFilings,
    };
    if(existing){ Object.assign(existing, data); }
    else{ DB.patents.push({id:uid(), ...data, addedAt:Date.now()}); }
    await saveKey('bmiel-patents', DB.patents);
    closeModal(); renderIP();
  });
}
async function deletePatent(id){
  showConfirm('Delete this patent?', async ()=>{
    DB.patents = DB.patents.filter(p=>p.id!==id);
    await saveKey('bmiel-patents', DB.patents);
    renderIP();
  });
}

function fmtNiceDate(iso){
  if(!iso) return '';
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const parts = iso.split('-');
  if(parts.length!==3) return iso;
  const [y,m,d] = parts;
  return `${months[+m-1]}. ${+d}, ${y}`;
}

async function mergeSeedDataIntoDB(){
  const s = SEED_DATA;
  DB.profPhoto = DB.profPhoto || s.profPhoto;
  DB.profCareer = [...s.profCareer.map(x=>({id:uid(),...x,addedAt:Date.now()})), ...DB.profCareer];
  DB.profEducation = [...s.profEducation.map(x=>({id:uid(),...x,addedAt:Date.now()})), ...DB.profEducation];
  DB.profAwards = [...s.profAwards.map(x=>({id:uid(),...x,addedAt:Date.now()})), ...DB.profAwards];
  DB.profActivity = [...s.profActivity.map(x=>({id:uid(),...x,addedAt:Date.now()})), ...DB.profActivity];
  DB.membersCurrent = [...s.membersCurrent.map(x=>({id:uid(),...x,pubLinks:[],conferences:x.conferences||[],addedAt:Date.now()})), ...DB.membersCurrent];
  DB.membersAlumni = [...s.membersAlumni.map(x=>({id:uid(),...x,addedAt:Date.now()})), ...DB.membersAlumni];
  DB.research = [...s.research.map(x=>({id:uid(),...x,addedAt:Date.now()})), ...DB.research];
  DB.publications = [...DB.publications, ...s.publications.map((x,i)=>({id:uid(),...x,addedAt:Date.now()+i}))];
  if(DB.journals.length===0 && s.journals && s.journals.length){
    DB.journals = s.journals.map(j=>{
      const pub = DB.publications.find(p=>p.title===j.pubTitle);
      return pub ? {id:uid(), pubId:pub.id, image:null, addedAt:Date.now()} : null;
    }).filter(Boolean).slice(0,5);
  }
  DB.patents = [...DB.patents, ...s.patents.map((x,i)=>({id:uid(),...x,addedAt:Date.now()+i}))];
  DB.presentations = [...DB.presentations, ...s.presentations.map((x,i)=>({id:uid(),...x,addedAt:Date.now()+i}))];
  DB.notices = [...DB.notices, ...s.notices.map((x,i)=>({id:uid(),...x,addedAt:Date.now()+i}))];
  DB.homeNotices = [...DB.homeNotices, ...(s.homeNotices||[]).map((x,i)=>({id:uid(),...x,addedAt:Date.now()+i}))];

  // auto-link each current member's own publications by matching author name,
  // and infer their role on that paper from the publication's own author-list role
  DB.membersCurrent.forEach(m=>{
    const linked = DB.publications.filter(p=>p.authors.some(a=>a.name.trim().toLowerCase()===m.name.trim().toLowerCase()));
    m.pubLinks = linked.map(p=>{
      const authorMatch = p.authors.find(a=>a.name.trim().toLowerCase()===m.name.trim().toLowerCase());
      let role = 'co';
      if(authorMatch){
        if(authorMatch.role==='first') role = 'first';
        else if(authorMatch.role==='corr') role = 'corr';
      }
      return {pubId:p.id, role};
    });
  });

  await saveKey('bmiel-prof-photo', DB.profPhoto, {silent:true});
  await saveKey('bmiel-prof-career', DB.profCareer, {silent:true});
  await saveKey('bmiel-prof-education', DB.profEducation, {silent:true});
  await saveKey('bmiel-prof-awards', DB.profAwards, {silent:true});
  await saveKey('bmiel-prof-activity', DB.profActivity, {silent:true});
  await saveKey('bmiel-members-current', DB.membersCurrent, {silent:true});
  await saveKey('bmiel-members-alumni', DB.membersAlumni, {silent:true});
  await saveKey('bmiel-research', DB.research, {silent:true});
  await saveKey('bmiel-publications', DB.publications, {silent:true});
  await saveKey('bmiel-journals', DB.journals, {silent:true});
  await saveKey('bmiel-patents', DB.patents, {silent:true});
  await saveKey('bmiel-presentations', DB.presentations, {silent:true});
  await saveKey('bmiel-notices', DB.notices, {silent:true});
  await saveKey('bmiel-home-notices', DB.homeNotices, {silent:true});
}
async function autoSeedOnFirstLoad(){
  const already = await loadKey('bmiel-seed-applied', false);
  if(!already){
    await mergeSeedDataIntoDB();
    await saveKey('bmiel-seed-applied', true, {silent:true});
  }
  const migrationsDone = await loadKey('bmiel-migrations-v2', false);
  if(!migrationsDone){
    await stripImportedImages();
    await migratePublicationCategories();
    await migratePatentFilings();
    await saveKey('bmiel-migrations-v2', true, {silent:true});
  }
}
async function stripImportedImages(){
  let changed = false;
  const isExternal = (url)=> typeof url === 'string' && url.startsWith('https://static.wixstatic.com');
  if(isExternal(DB.profPhoto)){ DB.profPhoto = ''; changed = true; }
  DB.membersCurrent.forEach(m=>{
    if(isExternal(m.photo)){ m.photo = null; changed = true; }
  });
  DB.research.forEach(r=>{
    if(isExternal(r.image)){ r.image = null; changed = true; }
  });
  if(changed){
    await saveKey('bmiel-prof-photo', DB.profPhoto, {silent:true});
    await saveKey('bmiel-members-current', DB.membersCurrent, {silent:true});
    await saveKey('bmiel-research', DB.research, {silent:true});
  }
}
async function migratePublicationCategories(){
  let changed = false;
  DB.publications.forEach(p=>{
    if(p.journal === 'BTNews' && p.category !== 'nonscie'){
      p.category = 'nonscie';
      delete p.link; delete p.image; delete p.ifYear; delete p.ifValue;
      delete p.jifPercentile; delete p.pubDate; delete p.onlineDate; delete p.highlighted;
      changed = true;
    }
  });
  if(changed){
    await saveKey('bmiel-publications', DB.publications, {silent:true});
  }
}
async function migratePatentFilings(){
  let changed = false;
  DB.patents.forEach(p=>{
    if(!p.filings){
      p.filings = [{country:p.country||'', appNum:p.appNum||'', appDate:p.appDate||'', regNum:p.regNum||'', regDate:p.regDate||''}];
      delete p.country; delete p.appNum; delete p.appDate; delete p.regNum; delete p.regDate;
      changed = true;
    }
    if(p.hasFamily && !p.famFilings){
      p.famFilings = [{country:p.famCountry||'', appNum:p.famAppNum||'', appDate:p.famAppDate||'', regNum:p.famRegNum||'', regDate:p.famRegDate||''}];
      delete p.famCountry; delete p.famAppNum; delete p.famAppDate; delete p.famRegNum; delete p.famRegDate;
      changed = true;
    }
  });
  if(changed){
    await saveKey('bmiel-patents', DB.patents, {silent:true});
  }
}
async function importSeedData(){
  closeModal();
  showConfirm(
    "Re-import content from the lab's previous website (molekimjh.wixsite.com/jihoonkim)? The site is already pre-loaded with this content once automatically, so this is only needed if you deleted it and want it back. Running it again will create duplicate entries alongside anything already there.",
    async ()=>{
      await mergeSeedDataIntoDB();
      alert('Import complete! Content from the lab website has been added to every section.');
      renderPage(currentPage);

    'Import content', 'var(--navy)'
  );
}
